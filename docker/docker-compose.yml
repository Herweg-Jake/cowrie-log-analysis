# Docker Compose for local Elasticsearch + Kibana
# Run with: docker-compose up -d
# 
# Make sure to set vm.max_map_count on the host:
#   sudo sysctl -w vm.max_map_count=262144
# Or permanently in /etc/sysctl.conf

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cowrie-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false  # disable auth for local dev
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"  # adjust based on your RAM
      - cluster.name=cowrie-cluster
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - cowrie-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status']
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: cowrie-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - cowrie-net
    depends_on:
      - elasticsearch

volumes:
  esdata:
    driver: local

networks:
  cowrie-net:
    driver: bridge
